<!-- templates/base.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
    {% include "_analytics.html" %}
  <title>{% block title %}Strava Tracker{% endblock %}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <!-- Tailwind (CDN build is fine for now) -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-neutral-950 text-neutral-100 min-h-screen">
  <!-- Top bar -->
  <header class="bg-neutral-900 border-b border-neutral-800">
    <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
      <a href="/" class="font-bold tracking-tight">Strava Tracker</a>
      <div class="flex items-center gap-3">
        {% if sport %}
          <a href="/"
             class="text-sm text-neutral-300 hover:text-white">
             Change sport (current: {{ sport|capitalize }})
          </a>
        {% else %}
          <span class="text-sm text-neutral-500">Pick a sport to get started</span>
        {% endif %}
        <a href="/how-this-works"
           class="text-xs border border-neutral-700 px-3 py-1 rounded-full text-neutral-300 hover:text-white hover:border-neutral-500">
           Support
        </a>
      </div>
    </div>
  </header>

  <!-- Page content -->
  <main class="max-w-6xl mx-auto px-4 py-8">
    {% block content %}{% endblock %}
  </main>

  <footer class="text-center text-neutral-500 py-6">
    &copy; {{ current_year|default(2025) }} Strava Tracker
  </footer>
</body>
</html>
