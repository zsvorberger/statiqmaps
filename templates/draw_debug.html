<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
    {% include "_analytics.html" %}
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Draw Debug</title>
<link href="https://unpkg.com/maplibre-gl@2.4.0/dist/maplibre-gl.css" rel="stylesheet">
<link href="https://unpkg.com/@mapbox/mapbox-gl-draw@1.5.0/dist/mapbox-gl-draw.css" rel="stylesheet">
<style>
  html, body { height:100%; margin:0; }
  #map { position:fixed; inset:0; z-index:1; }
  #status { position:fixed; top:8px; left:8px; z-index:10; background:#111c; color:#a7f3d0; font:12px monospace; padding:6px 8px; border-radius:6px; }
  .panel { position:fixed; right:10px; bottom:10px; z-index:20; background:#fff; border:1px solid #e5e7eb; border-radius:10px; padding:10px; width:320px; font:14px system-ui; box-shadow:0 4px 16px rgba(0,0,0,.12); }
  .btn { display:inline-block; padding:8px 10px; border-radius:10px; border:1px solid #d1d5db; background:#fff; cursor:pointer; }
  .btn.primary { background:#2563eb; color:#fff; border-color:#2563eb; }
  #fab { position:fixed; left:14px; bottom:14px; z-index:25; width:50px; height:50px; border-radius:999px; background:#fff; border:1px solid #d1d5db; display:flex; align-items:center; justify-content:center; font-size:22px; box-shadow:0 3px 14px rgba(0,0,0,.2); cursor:pointer; }
  #fab.active { background:#2563eb; color:#fff; border-color:#2563eb; }
  #toast { position:fixed; right:14px; bottom:14px; z-index:30; background:#111827; color:#fff; padding:10px 12px; border-radius:10px; display:none; }
  textarea,input { width:100%; padding:6px; border:1px solid #d1d5db; border-radius:8px; }
  .muted{ color:#6b7280; font-size:12px; }
</style>
</head>
<body>
<div id="map"></div>
<div id="status">loading…</div>

<div class="panel">
  <div style="font-weight:700; margin-bottom:6px;">Draw new line</div>
  <div id="hint" class="muted" style="margin-bottom:8px;">Click ✎ then click to add points, double-click to finish.</div>
  <div style="margin-bottom:6px;">
    <label>Length</label>
    <input id="lenField" value="—" readonly>
  </div>
  <div style="margin-bottom:8px;">
    <label>Note (optional)</label>
    <textarea id="note" rows="2" placeholder="Trail name / surface / context"></textarea>
  </div>
  <div style="display:flex; gap:8px;">
    <button id="submit" class="btn primary" style="flex:1;" disabled>Submit drawn trail</button>
    <button id="clear" class="btn">Clear</button>
  </div>
  <div class="muted" style="margin-top:6px;">Requires zoom ≥ <b>17</b> to submit.</div>
</div>

<button id="fab" title="Toggle drawing">✎</button>
<div id="toast"></div>

<script src="https://unpkg.com/maplibre-gl@2.4.0/dist/maplibre-gl.js"></script>
<script src="https://unpkg.com/@mapbox/mapbox-gl-draw@1.5.0/dist/mapbox-gl-draw.js"></script>
<script src="https://unpkg.com/@turf/turf@6.5.0/turf.min.js"></script>
<script>
(function(){
  const toast = (m)=>{ const t=document.getElementById('toast'); t.textContent=m; t.style.display='block'; setTimeout(()=>t.style.display='none',2200); };
  const setStatus=(m)=>{ const s=document.getElementById('status'); s.textContent=m; };

  let map, Draw, drawing=false;

  map = new maplibregl.Map({
    container:'map',
    style:{
      version:8,
      sources:{ osm:{ type:'raster', tiles:['https://tile.openstreetmap.org/{z}/{x}/{y}.png'], tileSize:256, maxzoom:19 } },
      layers:[ { id:'osm', type:'raster', source:'osm' } ]
    },
    center:[-80.0,40.5], zoom:8
  });

  map.on('load', ()=>{
    // draw control (toolbar visible for reliability)
    Draw = new MapboxDraw({ displayControlsDefault:false, controls:{ line_string:true, trash:true }});
    map.addControl(new maplibregl.NavigationControl(), 'top-right');
    map.addControl(Draw, 'top-right');

    // update length when drawing changes
    map.on('draw.create', update);
    map.on('draw.update', update);
    map.on('draw.delete', update);

    setStatus('ready — click ✎ to draw, double-click to finish');
  });

  function toggleDrawing(){
    drawing = !drawing;
    document.getElementById('fab').classList.toggle('active', drawing);
    map.getCanvas().style.cursor = drawing ? 'crosshair' : '';
    if (!Draw) return;
    Draw.changeMode(drawing ? 'draw_line_string' : 'simple_select');
    document.getElementById('hint').textContent = drawing
      ? 'Drawing: click to add points, double-click to finish.'
      : 'Click ✎ then click to add points, double-click to finish.';
  }

  function getLine(){
    const fc = Draw.getAll();
    return fc.features.find(f => f.geometry && f.geometry.type === 'LineString');
  }

  function update(){
    const line = getLine();
    const lenM = line ? Math.round(turf.length(line,{units:'kilometers'})*1000) : 0;
    document.getElementById('lenField').value = line ? `${lenM.toLocaleString()} m` : '—';
    document.getElementById('submit').disabled = !line;
    if (line) { drawing = false; document.getElementById('fab').classList.remove('active'); map.getCanvas().style.cursor=''; }
  }

  document.getElementById('fab').addEventListener('click', toggleDrawing);
  document.getElementById('clear').addEventListener('click', ()=>{
    if (Draw) Draw.deleteAll();
    document.getElementById('note').value='';
    update();
  });

  document.getElementById('submit').addEventListener('click', async ()=>{
    const line = getLine();
    if (!line) return toast('Draw a line first (✎).');
    if (map.getZoom() < 17) return toast('Zoom in closer (≥17) to submit.');

    const payload = {
      type: 'new_trail',
      status: 'pending',
      proposed_surface: 'trail',
      note: document.getElementById('note').value || '',
      geometry: line.geometry,
      client_meta: { zoom: map.getZoom(), center: map.getCenter() }
    };

    try{
      const r = await fetch('/api/submissions', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload) });
      const j = await r.json();
      if (j.ok) toast('Submitted ✅ — open /review to approve');
      else toast('Submit failed: ' + (j.error || 'unknown'));
    }catch(e){
      console.error(e);
      toast('Network error');
    }
  });
})();
</script>
</body>
</html>
