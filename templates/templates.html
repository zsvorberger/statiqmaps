<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    {% include "_analytics.html" %}
    <title>Strava Activity History</title>
</head>
<body>
    <h1>📊 Your Strava Activity History</h1>
    <ul>

        <li><strong>Total Moving Time:</strong> {{ total_time }} hours</li>
    </ul>

    <a href="/">⬅ Back to Home</a>
</body>
</html>
